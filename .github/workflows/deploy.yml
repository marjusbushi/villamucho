name: Deploy to Hetzner

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /var/www/villamucho
            # Maintenance mode during the deploy: in-flight requests get a clean 503
            # instead of a mid-migration 500 (new code querying a table the migration
            # has not created yet). The trap guarantees the site comes back even on failure.
            php artisan down --retry=15 || true
            trap 'cd /var/www/villamucho && php artisan up || true' EXIT
            git fetch origin main --quiet
            git reset --hard origin/main
            export COMPOSER_ALLOW_SUPERUSER=1
            composer install --no-dev --optimize-autoloader -q
            npm ci --no-audit --no-fund
            npm run build
            php artisan migrate --force
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            # Reload the queue worker so it picks up the new code (no-op if none runs).
            php artisan queue:restart || true
            chown -R www-data:www-data storage bootstrap/cache
            # Clear stale OPcache after atomic code/cache replacement. Discover the
            # running service instead of hard-coding the server's PHP minor version.
            php_fpm_service="$(systemctl list-units --type=service --state=running 'php*-fpm.service' --no-legend | awk 'NR == 1 { print $1 }')"
            if [ -n "$php_fpm_service" ]; then
              systemctl reload "$php_fpm_service"
            fi
            # Temporary redacted diagnostics for the guest-directory 502.
            if [ -f storage/logs/laravel.log ]; then
              grep 'production.ERROR' storage/logs/laravel.log | tail -n 5 | sed -E 's/[[:alnum:]._%+-]+@[[:alnum:].-]+/[email]/g; s/[0-9]{7,}/[number]/g' | cut -c1-600 || true
            fi
            if [ -f /var/log/nginx/error.log ]; then
              tail -n 20 /var/log/nginx/error.log | sed -E 's/[[:alnum:]._%+-]+@[[:alnum:].-]+/[email]/g; s/[0-9]{7,}/[number]/g' | cut -c1-600 || true
            fi
            php artisan up
            trap - EXIT
            echo "Deployed at $(date)"
