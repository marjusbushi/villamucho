name: Deploy to Hetzner

on:
  workflow_run:
    workflows: [Tests]
    types: [completed]
    branches: [main]

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  classify:
    name: Classify main change
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.change.outputs.should_deploy }}
    steps:
      - name: Checkout exact tested main commit
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 2
          persist-credentials: false

      - name: Skip a control-plane-only bootstrap
        id: change
        env:
          CANDIDATE_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -Eeuo pipefail
          [[ "$CANDIDATE_SHA" =~ ^[0-9a-f]{40}$ ]]
          [[ "$(git rev-parse HEAD)" == "$CANDIDATE_SHA" ]]
          parent="$(git rev-parse "${CANDIDATE_SHA}^")"
          [[ "$parent" =~ ^[0-9a-f]{40}$ ]]
          should_deploy=false
          changed=0
          while IFS= read -r path; do
            [[ -n "$path" ]] || continue
            changed=$((changed + 1))
            case "$path" in
              .github/CODEOWNERS | \
              .github/workflows/deploy.yml | \
              .github/workflows/production-release-rehearsal.yml | \
              .github/workflows/tests.yml | \
              deploy/scripts/deploy-production.sh | \
              deploy/scripts/configure-control-panel-domain.sh | \
              ops/backup/lora-backup.service | \
              ops/backup/run-offsite-backup.sh | \
              ops/backup/run-release-rehearsal.sh) ;;
              *) should_deploy=true ;;
            esac
          done < <(git diff --name-only "$parent" "$CANDIDATE_SHA")
          (( changed > 0 ))
          printf 'should_deploy=%s\n' "$should_deploy" >> "$GITHUB_OUTPUT"

  deploy:
    needs: classify
    if: >-
      needs.classify.outputs.should_deploy == 'true' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_repository.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 360
    environment: production
    steps:
      - name: Validate pinned deployment credentials
        env:
          SERVER_IP: ${{ secrets.SERVER_IP }}
          SERVER_FINGERPRINT: ${{ secrets.SERVER_FINGERPRINT }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          set -Eeuo pipefail
          [[ -n "$SERVER_IP" ]]
          [[ "$SERVER_IP" =~ ^[A-Za-z0-9.:-]+$ ]]
          [[ "$SERVER_FINGERPRINT" =~ ^SHA256:[A-Za-z0-9+/]{43}=?$ ]]
          [[ -n "$SSH_PRIVATE_KEY" ]]

      - name: Deploy via SSH
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          fingerprint: ${{ secrets.SERVER_FINGERPRINT }}
          command_timeout: 350m
          script: |
            set -Eeuo pipefail

            app_dir=/var/www/villamucho
            tested_sha="${{ github.event.workflow_run.head_sha }}"
            deploy_script_sha="9f85f555a06fa94043db891af7ef48a1173ea7262527527fd5775b941b53c704"
            deploy_script_tmp=

            fail() {
              echo "Production deploy bootstrap refused: $*" >&2
              exit 1
            }

            cleanup() {
              if [ -n "$deploy_script_tmp" ]; then
                rm -f -- "$deploy_script_tmp"
              fi
            }
            trap cleanup EXIT HUP INT TERM

            case "$tested_sha" in
              ""|*[!0-9a-f]*) fail "tested commit is not lowercase hexadecimal" ;;
            esac
            [ "${#tested_sha}" -eq 40 ] || fail "tested commit must contain exactly 40 characters"
            [ -d "$app_dir/.git" ] && [ ! -L "$app_dir/.git" ] \
              || fail "production Git metadata is missing or unsafe"
            if find "$app_dir/.git" -xdev \
              \( ! -user root -o -perm /022 \) -print -quit | grep -q .; then
              fail "production Git metadata must be root-owned and immutable"
            fi
            cd "$app_dir"
            origin_url="$(git remote get-url origin)"
            case "$origin_url" in
              "https://github.com/marjusbushi/Lora.git"|"git@github.com:marjusbushi/Lora.git") ;;
              *) fail "production origin remote is not the trusted repository" ;;
            esac
            git fetch --no-tags origin \
              "+refs/heads/main:refs/remotes/origin/main" --quiet
            main_sha="$(git rev-parse origin/main)"
            [ "$main_sha" = "$tested_sha" ] \
              || fail "tested commit is not the current origin/main"
            git cat-file -e "$tested_sha^{commit}"
            deploy_script_tmp="$(mktemp /run/lora-production-deploy.XXXXXXXX)"
            install -o root -g root -m 0700 /dev/null "$deploy_script_tmp"
            git show "$tested_sha:deploy/scripts/deploy-production.sh" > "$deploy_script_tmp"
            [ -s "$deploy_script_tmp" ] && [ ! -L "$deploy_script_tmp" ] \
              || fail "versioned production deploy script is missing"
            [ "$(stat -c %s "$deploy_script_tmp")" -le 1048576 ] \
              || fail "versioned production deploy script exceeds its size limit"
            [ "$(sha256sum "$deploy_script_tmp" | awk '{print $1}')" = "$deploy_script_sha" ] \
              || fail "versioned production deploy script hash does not match"
            bash -n "$deploy_script_tmp"
            "$deploy_script_tmp" "$tested_sha"
