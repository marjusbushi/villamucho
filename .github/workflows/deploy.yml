name: Deploy to Hetzner

on:
  workflow_run:
    workflows: [Tests]
    types: [completed]
    branches: [main]

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /var/www/villamucho
            # Maintenance mode during the deploy: in-flight requests get a clean 503
            # instead of a mid-migration 500 (new code querying a table the migration
            # has not created yet). The trap guarantees the site comes back even on failure.
            php artisan down --retry=15 || true
            trap 'cd /var/www/villamucho && php artisan up || true' EXIT
            git fetch origin main --quiet
            git reset --hard origin/main
            export COMPOSER_ALLOW_SUPERUSER=1
            composer install --no-dev --optimize-autoloader -q
            npm ci --no-audit --no-fund
            npm run build
            php artisan migrate --force
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            # Reload the queue worker so it picks up the new code (no-op if none runs).
            php artisan queue:restart || true
            chown -R www-data:www-data storage bootstrap/cache
            php artisan up
            trap - EXIT
            echo "Deployed at $(date)"
