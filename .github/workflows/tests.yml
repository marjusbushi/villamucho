name: Tests

on:
  push:
    branches:
      - staging
      - 'feat/**'
  pull_request:
    branches:
      - staging
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  application:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      APP_ENV: testing
      APP_KEY: base64:4Cq6c8e+3Yi8oFv3NgTQ8zrThm3nZI2uv8Y4OUYHiRw=
      APP_URL: http://localhost
      DB_CONNECTION: sqlite
      DB_DATABASE: database/testing.sqlite
      CACHE_STORE: array
      SESSION_DRIVER: array
      QUEUE_CONNECTION: sync
      MAIL_MAILER: array

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, pdo_mysql
          coverage: none

      - name: Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Prepare SQLite
        run: touch database/testing.sqlite

      - name: Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm

      - name: Frontend dependencies
        run: npm ci --no-audit --no-fund

      - name: Build frontend
        run: npm run build

      - name: Test application
        run: php artisan test --compact

  mysql-migrations:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_DATABASE: testing
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -proot"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20

    env:
      APP_ENV: testing
      APP_KEY: base64:4Cq6c8e+3Yi8oFv3NgTQ8zrThm3nZI2uv8Y4OUYHiRw=
      APP_URL: http://localhost
      DB_CONNECTION: mysql
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_DATABASE: testing
      DB_USERNAME: root
      DB_PASSWORD: root
      CACHE_STORE: array
      SESSION_DRIVER: array
      QUEUE_CONNECTION: sync
      MAIL_MAILER: array

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, pdo_mysql
          coverage: none

      - name: Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Verify MySQL migrations
        run: php artisan migrate:fresh --force
