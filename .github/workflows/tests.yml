name: Tests

on:
  push:
    branches:
      - main
      - staging
      - 'feat/**'
  pull_request:
    branches:
      - staging
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  application:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      APP_ENV: testing
      APP_KEY: base64:4Cq6c8e+3Yi8oFv3NgTQ8zrThm3nZI2uv8Y4OUYHiRw=
      APP_URL: http://localhost
      DB_CONNECTION: sqlite
      DB_DATABASE: database/testing.sqlite
      CACHE_STORE: array
      SESSION_DRIVER: array
      QUEUE_CONNECTION: sync
      MAIL_MAILER: array

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, pdo_mysql
          coverage: none

      - name: Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Prepare SQLite
        run: touch database/testing.sqlite

      - name: Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm

      - name: Frontend dependencies
        run: npm ci --no-audit --no-fund

      - name: Build frontend
        run: npm run build

      - name: Test application
        run: php artisan test --compact

  mysql-migrations:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_DATABASE: testing
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -proot"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20

    env:
      APP_ENV: testing
      APP_KEY: base64:4Cq6c8e+3Yi8oFv3NgTQ8zrThm3nZI2uv8Y4OUYHiRw=
      APP_URL: http://localhost
      DB_CONNECTION: mysql
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_DATABASE: testing
      DB_USERNAME: root
      DB_PASSWORD: root
      CACHE_STORE: array
      SESSION_DRIVER: array
      QUEUE_CONNECTION: sync
      MAIL_MAILER: array

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, pdo_mysql
          coverage: none

      - name: Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Verify MySQL migrations
        run: php artisan migrate:fresh --force

  mysql-tenancy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      mysql:
        image: mysql:8.0.46
        env:
          MYSQL_DATABASE: testing_tenancy
          MYSQL_USER: lora
          MYSQL_PASSWORD: lora
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -ulora -plora"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20

    env:
      APP_ENV: testing
      APP_KEY: base64:4Cq6c8e+3Yi8oFv3NgTQ8zrThm3nZI2uv8Y4OUYHiRw=
      APP_URL: http://localhost
      DB_CONNECTION: mysql
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_DATABASE: testing_tenancy
      DB_USERNAME: lora
      DB_PASSWORD: lora
      DB_CACHE_CONNECTION: mysql
      SESSION_CONNECTION: mysql
      DB_QUEUE_CONNECTION: mysql
      CACHE_STORE: database
      SESSION_DRIVER: database
      QUEUE_CONNECTION: database
      MAIL_MAILER: array

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, pdo_mysql
          coverage: none

      - name: Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Enable application-owned trigger DDL
        run: mysql -h 127.0.0.1 -P 3306 -uroot -proot -e 'SET GLOBAL log_bin_trust_function_creators = 1'

      - name: Test tenancy on production-like MySQL
        run: |
          php artisan test --compact \
            tests/Feature/TenantDatabaseIntegrityTest.php \
            tests/Feature/TenantIntegrityCommandTest.php \
            tests/Feature/TenantDomainRoutingTest.php \
            tests/Feature/TenantHandoffTest.php \
            tests/Feature/TenantIsolationTest.php \
            tests/Feature/TenantMutationIsolationTest.php \
            tests/Feature/TenantInfrastructureIsolationTest.php \
            tests/Feature/TenantAccessControlTest.php \
            tests/Feature/TenantUserInvitationTest.php \
            tests/Feature/LoraAiMcpTest.php \
            tests/Feature/GuestMessagingTest.php \
            tests/Feature/ChannexBookingImportTest.php \
            tests/Feature/ControlPanelIsolationTest.php

  mysql-upgrade:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      mysql:
        image: mysql:8.0.46
        env:
          MYSQL_DATABASE: testing_upgrade
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3307:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -proot"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20

    env:
      APP_ENV: testing
      APP_KEY: base64:4Cq6c8e+3Yi8oFv3NgTQ8zrThm3nZI2uv8Y4OUYHiRw=
      APP_URL: http://localhost
      DB_CONNECTION: mysql
      DB_HOST: 127.0.0.1
      DB_PORT: 3307
      DB_DATABASE: testing_upgrade
      DB_USERNAME: root
      DB_PASSWORD: root
      CACHE_STORE: array
      SESSION_DRIVER: array
      QUEUE_CONNECTION: sync
      MAIL_MAILER: array

    steps:
      - name: Checkout target branch schema
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.base.sha || github.event.before || 'staging' }}
          fetch-depth: 0

      - name: PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, pdo_mysql
          coverage: none

      - name: Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Build target branch database
        run: php artisan migrate:fresh --force

      - name: Seed representative staging data
        run: php artisan db:seed --force

      - name: Checkout candidate code
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          clean: true

      - name: Refresh candidate Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Snapshot pre-upgrade schema and data
        run: |
          mysql -h 127.0.0.1 -P 3307 -uroot -proot -N testing_upgrade \
            -e 'SELECT COALESCE(MAX(batch), 0) FROM migrations' \
            > /tmp/lora-pre-upgrade-batch
          mysqldump -h 127.0.0.1 -P 3307 -uroot -proot \
            --no-data --skip-comments --skip-dump-date --compact testing_upgrade \
            | php scripts/canonicalize-mysql-schema.php \
            > /tmp/lora-schema-before.sql
          checksum_sql="$(mysql -h 127.0.0.1 -P 3307 -uroot -proot -N -e \
            "SET SESSION group_concat_max_len = 1000000; SELECT CONCAT('CHECKSUM TABLE ', GROUP_CONCAT(CONCAT('testing_upgrade.', table_name) ORDER BY table_name SEPARATOR ', '), ';') FROM information_schema.tables WHERE table_schema = 'testing_upgrade' AND table_type = 'BASE TABLE'")"
          mysql -h 127.0.0.1 -P 3307 -uroot -proot -N -e "$checksum_sql" \
            > /tmp/lora-data-before.tsv

      - name: Snapshot pre-upgrade integrity
        run: php artisan tenants:verify-integrity --snapshot=/tmp/lora-upgrade-baseline.json

      - name: Verify upgrade from target branch
        run: php artisan migrate --force

      - name: Verify post-upgrade integrity and totals
        run: php artisan tenants:verify-integrity --compare=/tmp/lora-upgrade-baseline.json --allow-additive-schema --allow-additive-settings

      - name: Verify exact database rollback
        run: |
          baseline_batch="$(cat /tmp/lora-pre-upgrade-batch)"
          release_batch="$(mysql -h 127.0.0.1 -P 3307 -uroot -proot -N \
            testing_upgrade -e 'SELECT MAX(batch) FROM migrations')"
          test -n "$baseline_batch"
          test -n "$release_batch"
          case "$baseline_batch:$release_batch" in
            *[!0-9:]*) echo "Invalid migration batch values" >&2; exit 1 ;;
          esac
          if (( release_batch > baseline_batch )); then
            php artisan migrate:rollback --batch="$release_batch" --force
          elif (( release_batch < baseline_batch )); then
            echo "Candidate removed an existing migration batch" >&2
            exit 1
          else
            echo "No candidate migrations to roll back"
          fi
          php artisan tenants:verify-integrity --compare=/tmp/lora-upgrade-baseline.json
          mysqldump -h 127.0.0.1 -P 3307 -uroot -proot \
            --no-data --skip-comments --skip-dump-date --compact testing_upgrade \
            | php scripts/canonicalize-mysql-schema.php \
            > /tmp/lora-schema-after-rollback.sql
          diff -u /tmp/lora-schema-before.sql /tmp/lora-schema-after-rollback.sql
          checksum_sql="$(mysql -h 127.0.0.1 -P 3307 -uroot -proot -N -e \
            "SET SESSION group_concat_max_len = 1000000; SELECT CONCAT('CHECKSUM TABLE ', GROUP_CONCAT(CONCAT('testing_upgrade.', table_name) ORDER BY table_name SEPARATOR ', '), ';') FROM information_schema.tables WHERE table_schema = 'testing_upgrade' AND table_type = 'BASE TABLE'")"
          mysql -h 127.0.0.1 -P 3307 -uroot -proot -N -e "$checksum_sql" \
            > /tmp/lora-data-after-rollback.tsv
          diff -u /tmp/lora-data-before.tsv /tmp/lora-data-after-rollback.tsv
