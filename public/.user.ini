; PHP-FPM per-directory upload limits for Villa Mucho (docroot = public/).
; Guest identity documents (passport/ID scans) can be up to 25MB.
; These are PHP_INI_PERDIR settings, honored by PHP-FPM for scripts in this
; directory (public/index.php). nginx client_max_body_size must also be >= these
; (set on the server — it cannot be configured from the app).
; NOTE: a php_admin_value override in the FPM pool would win over this file.
upload_max_filesize = 25M
post_max_size = 30M
